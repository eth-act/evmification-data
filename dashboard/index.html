<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ethereum Precompile Usage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #09090b;
    color: #a1a1aa;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    line-height: 1.6;
    padding: 0 0 80px;
    -webkit-font-smoothing: antialiased;
  }

  nav {
    border-bottom: 1px solid #18181b;
    padding: 0 32px;
    display: flex;
    gap: 0;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 10;
    height: 48px;
    background: rgba(9, 9, 11, 0.9);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  nav .brand {
    font-size: 14px;
    font-weight: 600;
    color: #fafafa;
    margin-right: 32px;
    letter-spacing: -0.3px;
  }
  nav a {
    color: #71717a;
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    padding: 13px 14px;
    transition: color 0.15s;
  }
  nav a:hover { color: #a1a1aa; }
  nav a.active { color: #fafafa; }

  .container { max-width: 960px; margin: 0 auto; padding: 0 24px; }

  header { padding: 56px 0 0; }
  header h1 {
    font-size: 28px;
    font-weight: 700;
    color: #fafafa;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }
  header .subtitle { font-size: 13px; color: #71717a; }

  .stats {
    display: flex;
    gap: 48px;
    margin: 36px 0 48px;
    flex-wrap: wrap;
  }
  .stat {}
  .stat .value {
    font-size: 32px;
    font-weight: 700;
    color: #fafafa;
    letter-spacing: -1px;
    line-height: 1.1;
  }
  .stat .label {
    font-size: 12px;
    color: #71717a;
    margin-top: 4px;
    font-weight: 500;
  }

  .divider {
    height: 1px;
    background: #18181b;
    margin: 0 0 32px;
  }

  .section { margin-bottom: 48px; }
  .section-label {
    font-size: 11px;
    font-weight: 500;
    color: #71717a;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 16px;
  }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    color: #71717a;
    font-weight: 500;
    text-align: left;
    padding: 0 0 12px;
    white-space: nowrap;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid #18181b;
    cursor: pointer;
    user-select: none;
    transition: color 0.1s;
  }
  thead th:hover { color: #a1a1aa; }
  thead th.sorted { color: #fafafa; }
  thead th.num { text-align: right; }
  tbody td {
    padding: 12px 0;
    border-bottom: 1px solid rgba(24, 24, 27, 0.6);
    white-space: nowrap;
    color: #a1a1aa;
  }
  tbody td.num { text-align: right; font-variant-numeric: tabular-nums; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr { cursor: pointer; transition: color 0.1s; }
  tbody tr:hover td { color: #fafafa; }
  .precompile-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 10px;
    vertical-align: middle;
  }
  tbody td a { color: inherit; text-decoration: none; }
</style>
</head>
<body>

<nav>
  <span class="brand">Precompiles</span>
  <a href="index.html" class="active">Overview</a>
  <a href="timeseries.html">Time Series</a>
</nav>

<div class="container">
  <header>
    <h1>Ethereum Precompile Usage</h1>
    <div class="subtitle" id="subtitle">Loading...</div>
  </header>

  <div class="stats" id="stats"></div>

  <div class="divider"></div>

  <div class="section">
    <div class="section-label">All Precompiles</div>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th class="num">Calls</th>
          <th class="num">Gas</th>
          <th class="num">Callers</th>
          <th class="num">Txs</th>
          <th class="num">1 in N</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</div>

<script>
const COLORS = {
  sha256: '#34d399', ecrecover: '#60a5fa', identity: '#a78bfa',
  ecadd: '#fb923c', ecmul: '#fbbf24', modexp_le256: '#f472b6', modexp_gt256: '#c084fc',
  ecpairing: '#f87171', pointEval: '#38bdf8', blake2f: '#4ade80',
  bls12_g1msm: '#e879f9', bls12_map_fp_to_g1: '#facc15', ripemd160: '#94a3b8',
};

function fmtCompact(n) {
  if (n >= 1e9) return (n / 1e9).toFixed(1).replace(/\.0$/, '') + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(1).replace(/\.0$/, '') + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1).replace(/\.0$/, '') + 'K';
  return String(n);
}

function fmtComma(n) { return n.toLocaleString('en-US'); }

async function main() {
  const data = await (await fetch('data/overview.json')).json();

  document.getElementById('subtitle').textContent =
    `Blocks #${fmtComma(data.block_range[0])} to #${fmtComma(data.block_range[1])}`;

  const statsEl = document.getElementById('stats');
  [
    { value: fmtCompact(data.total_precompile_calls), label: 'Total calls' },
    { value: fmtCompact(data.total_unique_txs), label: 'Unique transactions' },
    { value: data.precompiles.length, label: 'Precompiles' },
  ].forEach(s => {
    const div = document.createElement('div');
    div.className = 'stat';
    div.innerHTML = `<div class="value">${s.value}</div><div class="label">${s.label}</div>`;
    statsEl.appendChild(div);
  });

  const columns = [
    { key: 'precompile', label: 'Name', numeric: false },
    { key: 'calls', label: 'Calls', numeric: true },
    { key: 'gas', label: 'Gas', numeric: true },
    { key: 'unique_callers', label: 'Callers', numeric: true },
    { key: 'unique_txs', label: 'Txs', numeric: true },
    { key: 'one_in_n_txs', label: '1 in N', numeric: true },
  ];

  let sortKey = 'calls';
  let sortAsc = false;

  function renderTable() {
    const sorted = [...data.precompiles].sort((a, b) => {
      const av = a[sortKey] ?? 0, bv = b[sortKey] ?? 0;
      if (typeof av === 'string') return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
      return sortAsc ? av - bv : bv - av;
    });

    // Update header styles
    document.querySelectorAll('thead th').forEach(th => {
      th.classList.toggle('sorted', th.dataset.key === sortKey);
      const arrow = sortAsc ? ' \u2191' : ' \u2193';
      const col = columns.find(c => c.key === th.dataset.key);
      th.textContent = col ? col.label + (th.dataset.key === sortKey ? arrow : '') : '';
    });

    const tbody = document.getElementById('table-body');
    tbody.innerHTML = '';
    sorted.forEach(p => {
      const tr = document.createElement('tr');
      const color = COLORS[p.precompile] || '#71717a';
      tr.innerHTML = `
        <td><span class="precompile-dot" style="background:${color}"></span><a href="precompile.html?p=${p.precompile}">${p.precompile}</a></td>
        <td class="num">${fmtComma(p.calls)}</td>
        <td class="num">${fmtComma(p.gas)}</td>
        <td class="num">${fmtComma(p.unique_callers)}</td>
        <td class="num">${fmtComma(p.unique_txs)}</td>
        <td class="num">${p.one_in_n_txs ? p.one_in_n_txs.toLocaleString('en-US') : '—'}</td>
      `;
      tr.addEventListener('click', () => window.location = `precompile.html?p=${p.precompile}`);
      tbody.appendChild(tr);
    });
  }

  // Build header with data-key attributes
  const headerRow = document.querySelector('thead tr');
  headerRow.innerHTML = '';
  columns.forEach(col => {
    const th = document.createElement('th');
    th.textContent = col.label;
    th.dataset.key = col.key;
    if (col.numeric) th.className = 'num';
    th.addEventListener('click', () => {
      if (sortKey === col.key) { sortAsc = !sortAsc; }
      else { sortKey = col.key; sortAsc = false; }
      renderTable();
    });
    headerRow.appendChild(th);
  });

  renderTable();
}

main();
</script>
</body>
</html>
